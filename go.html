<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全跳转 · 数字花园</title>
    <style>
        :root {
            --bg: #f5f4f1;
            --surface: #ffffff;
            --text: #1a1a24;
            --text-secondary: #4a4a5a;
            --text-muted: #8a8a9a;
            --accent: #4f46e5;
            --accent-hover: #4338ca;
            --accent-soft: #eef2ff;
            --border: #e5e3de;
            --danger: #ef4444;
            --success: #10b981;
            --radius-sm: 8px;
            --radius: 12px;
            --radius-lg: 20px;
            --radius-xl: 28px;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.05);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
            --shadow-lg: 0 20px 50px rgba(0,0,0,0.10);
            --shadow-xl: 0 28px 64px rgba(0,0,0,0.12);
            --font: 'Microsoft YaHei', 'PingFang SC', 'Helvetica Neue', system-ui, -apple-system, sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font);
            background: var(--bg);
            background-image: 
                radial-gradient(ellipse at 20% 50%, rgba(79,70,229,0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(99,102,241,0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(129,140,248,0.02) 0%, transparent 50%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .go-container {
            background: var(--surface);
            border-radius: var(--radius-xl);
            padding: 48px 44px;
            text-align: center;
            box-shadow: var(--shadow-xl);
            max-width: 440px;
            width: 92%;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        /* 顶部装饰线 */
        .go-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), #818cf8, #6366f1);
        }

        .go-icon-wrap {
            width: 72px;
            height: 72px;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--accent), #818cf8);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 8px 24px rgba(79,70,229,0.25);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .go-icon {
            font-size: 2rem;
            animation: rocket 0.5s ease-in-out infinite alternate;
        }

        @keyframes rocket {
            from { transform: translateY(0) rotate(-5deg); }
            to { transform: translateY(-3px) rotate(5deg); }
        }

        .go-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }

        .go-subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 28px;
            letter-spacing: 0.2px;
        }

        /* 倒计时圆圈 */
        .countdown-wrap {
            position: relative;
            width: 88px;
            height: 88px;
            margin: 0 auto 20px;
        }

        .countdown-circle {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            font-size: 2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
            box-shadow: 0 4px 16px rgba(79,70,229,0.3);
            transition: all 0.3s ease;
        }

        .countdown-circle.go {
            background: var(--success);
            box-shadow: 0 4px 16px rgba(16,185,129,0.3);
            animation: pulse-go 0.5s ease 3;
        }

        @keyframes pulse-go {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        .countdown-ring {
            position: absolute;
            top: -4px; left: -4px;
            width: 96px; height: 96px;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: var(--accent);
            animation: spin 1.5s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 进度条 */
        .progress-wrap {
            width: 100%;
            margin-bottom: 22px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e8e8f0;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #818cf8);
            border-radius: 3px;
            transition: width 0.15s linear;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            right: 0; top: 0; bottom: 0;
            width: 12px;
            background: rgba(255,255,255,0.4);
            border-radius: 3px;
        }

        .progress-text {
            display: flex;
            justify-content: space-between;
            margin-top: 6px;
            font-size: 0.72rem;
            color: var(--text-muted);
        }

        /* 安全提示 */
        .safety-note {
            font-size: 0.8rem;
            color: var(--text-muted);
            padding: 12px 16px;
            background: var(--accent-soft);
            border-radius: var(--radius);
            line-height: 1.6;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 1px solid rgba(79,70,229,0.1);
        }

        .safety-note .lock-icon {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        /* 错误状态 */
        .error .go-icon-wrap {
            background: linear-gradient(135deg, #ef4444, #f87171);
            box-shadow: 0 8px 24px rgba(239,68,68,0.25);
        }

        .error .countdown-circle {
            background: #ef4444;
            box-shadow: 0 4px 16px rgba(239,68,68,0.3);
        }

        .error .safety-note {
            background: #fef2f2;
            border-color: rgba(239,68,68,0.1);
            color: #991b1b;
        }

        .error .progress-fill {
            background: linear-gradient(90deg, #ef4444, #f87171);
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .go-container {
                padding: 36px 24px;
            }
            .go-icon-wrap {
                width: 60px;
                height: 60px;
                border-radius: 16px;
            }
            .go-icon {
                font-size: 1.6rem;
            }
            .countdown-circle {
                width: 72px;
                height: 72px;
                font-size: 1.6rem;
            }
            .countdown-wrap {
                width: 72px;
                height: 72px;
            }
            .countdown-ring {
                width: 80px;
                height: 80px;
            }
            .go-title {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <div class="go-container" id="goContainer">
        <!-- 图标 -->
        <div class="go-icon-wrap">
            <span class="go-icon" id="goIcon">🚀</span>
        </div>

        <!-- 标题 -->
        <div class="go-title" id="goTitle">正在安全跳转</div>
        <div class="go-subtitle" id="goSubtitle">请稍候，正在验证并跳转到目标页面...</div>

        <!-- 倒计时 -->
        <div class="countdown-wrap">
            <div class="countdown-ring" id="countdownRing"></div>
            <div class="countdown-circle" id="countdown">3</div>
        </div>

        <!-- 进度条 -->
        <div class="progress-wrap">
            <div class="progress-bar">
                <div class="progress-fill" id="progressBar" style="width: 0%;"></div>
            </div>
            <div class="progress-text">
                <span>验证中</span>
                <span id="progressPercent">0%</span>
            </div>
        </div>

        <!-- 安全提示 -->
        <div class="safety-note" id="safetyNote">
            <svg class="lock-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                <circle cx="12" cy="16" r="1"/>
            </svg>
            <span>AES-256 加密传输，目标地址安全不可见</span>
        </div>
    </div>

    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');
            const AES_KEY = 'YOUR_AES_KEY_HERE'; // 修改为你的加密密钥

            const COUNTDOWN_SECONDS = 3;

            const container = document.getElementById('goContainer');

            function showError(title, subtitle) {
                container.classList.add('error');
                document.getElementById('goIcon').textContent = '⚠️';
                document.getElementById('goTitle').textContent = title;
                document.getElementById('goSubtitle').textContent = subtitle;
                document.getElementById('countdown').textContent = '✕';
                document.getElementById('countdownRing').style.display = 'none';
                document.getElementById('progressBar').style.width = '0%';
                document.getElementById('progressPercent').textContent = '错误';
                document.getElementById('safetyNote').innerHTML = '<span>❌ 跳转验证失败，请联系管理员</span>';
            }

            if (!token) {
                showError('无效的跳转链接', '缺少安全验证令牌，无法进行跳转');
                return;
            }

            // AES-GCM 解密
            async function aesDecrypt(encryptedBase64, key) {
                try {
                    const keyBytes = new TextEncoder().encode(key).slice(0, 32);
                    const cryptoKey = await crypto.subtle.importKey(
                        'raw', keyBytes,
                        { name: 'AES-GCM' },
                        false,
                        ['decrypt']
                    );

                    // Base64 → ArrayBuffer
                    const binaryString = atob(encryptedBase64);
                    const bytes = new Uint8Array(binaryString.length);
                    for (let i = 0; i < binaryString.length; i++) {
                        bytes[i] = binaryString.charCodeAt(i);
                    }

                    // 分离 IV（前12字节）和密文
                    const iv = bytes.slice(0, 12);
                    const ciphertext = bytes.slice(12);

                    const decrypted = await crypto.subtle.decrypt(
                        { name: 'AES-GCM', iv: iv },
                        cryptoKey,
                        ciphertext
                    );

                    return new TextDecoder().decode(decrypted);
                } catch (e) {
                    console.error('AES 解密失败:', e);
                    return null;
                }
            }

            // 验证 URL 合法性
            function isValidUrl(url) {
                try {
                    const u = new URL(url);
                    return u.protocol === 'http:' || u.protocol === 'https:';
                } catch (e) {
                    return false;
                }
            }

            // 启动倒计时
            function startCountdown(targetUrl) {
                let countdown = COUNTDOWN_SECONDS;
                const total = COUNTDOWN_SECONDS;
                const countdownEl = document.getElementById('countdown');
                const progressBar = document.getElementById('progressBar');
                const progressPercent = document.getElementById('progressPercent');
                const subtitle = document.getElementById('goSubtitle');

                subtitle.textContent = `即将跳转至目标页面，请稍候...`;

                const timer = setInterval(() => {
                    countdown--;
                    countdownEl.textContent = countdown > 0 ? countdown : 'GO';

                    const progress = ((total - countdown) / total) * 100;
                    progressBar.style.width = progress + '%';
                    progressPercent.textContent = Math.round(progress) + '%';

                    if (countdown <= 0) {
                        clearInterval(timer);
                        countdownEl.classList.add('go');
                        progressBar.style.width = '100%';
                        progressPercent.textContent = '100%';
                        subtitle.textContent = '验证通过，正在跳转...';

                        // 跳转
                        setTimeout(() => {
                            window.location.href = targetUrl;
                        }, 300);
                    }
                }, 1000);
            }

            // 主流程
            (async function init() {
                const decryptedUrl = await aesDecrypt(token, AES_KEY);

                if (!decryptedUrl || !isValidUrl(decryptedUrl)) {
                    showError('令牌验证失败', '安全令牌无效、已过期或被篡改');
                    return;
                }

                // 成功，开始倒计时
                startCountdown(decryptedUrl);
            })();
        })();
    </script>
</body>
</html>
