<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>请在浏览器中打开 · 莫辞の资源库</title>
    <style>
        :root {
            --bg: #f5f4f1;
            --surface: #fff;
            --text: #1a1a24;
            --text-secondary: #4a4a5a;
            --text-muted: #8a8a9a;
            --accent: #4f46e5;
            --accent-hover: #4338ca;
            --border: #e5e3de;
            --radius-lg: 20px;
            --shadow-lg: 0 20px 50px rgba(0,0,0,0.10);
            --font: 'Microsoft YaHei','PingFang SC',system-ui,sans-serif;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:var(--font);background:var(--bg);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;line-height:1.6}
        .container{background:var(--surface);border-radius:var(--radius-lg);padding:40px 32px;max-width:420px;width:100%;box-shadow:var(--shadow-lg);border:1px solid var(--border);text-align:center}
        .icon{font-size:4rem;margin-bottom:16px}
        h1{font-size:1.3rem;color:var(--text);margin-bottom:8px}
        p{color:var(--text-secondary);font-size:0.92rem;margin-bottom:20px}
        .btn{padding:12px 28px;border-radius:30px;font-weight:600;font-size:0.95rem;cursor:pointer;border:none;transition:all 0.2s;font-family:var(--font);background:var(--accent);color:#fff;box-shadow:0 4px 12px rgba(79,70,229,0.3)}
        .btn:hover{background:var(--accent-hover);transform:translateY(-1px)}
        .btn-secondary{background:transparent;color:var(--text-muted);border:1px solid var(--border);box-shadow:none}
        .btn-secondary:hover{background:var(--bg);color:var(--text)}
        .btn-group{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:8px}
        .btn-group .btn{min-width:120px}
        .steps{text-align:left;margin:20px 0;padding:0 4px}
        .steps li{margin-bottom:10px;color:var(--text-secondary);font-size:0.88rem;list-style:none;display:flex;align-items:flex-start;gap:10px}
        .steps li .num{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;font-size:0.7rem;font-weight:700;flex-shrink:0;margin-top:1px}
        @media(max-width:480px){.container{padding:28px 18px}.icon{font-size:3rem}h1{font-size:1.1rem}.btn{width:100%}}
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🌐</div>
        <h1>请使用浏览器打开</h1>
        <p>检测到你正在使用微信或 QQ 内置浏览器，部分功能可能无法正常使用。</p>
        <div class="steps">
            <li><span class="num">1</span> 点击右上角 <strong>「···」</strong> 菜单</li>
            <li><span class="num">2</span> 选择 <strong>「在浏览器中打开」</strong></li>
            <li><span class="num">3</span> 在浏览器中继续访问</li>
        </div>
        <div class="btn-group">
            <button class="btn btn-secondary" onclick="window.location.href='/'">返回首页</button>
            <button class="btn" onclick="copyAndOpen()">📋 复制链接</button>
        </div>
        <p style="font-size:0.75rem;color:var(--text-muted);margin-top:16px;">如果以上方法无效，请复制链接到系统浏览器中打开</p>
    </div>
    <script>
        function copyAndOpen() {
            const url = window.location.href.replace('/go-browser.html?url=', '');
            const targetUrl = decodeURIComponent(url);
            if (targetUrl && targetUrl.startsWith('http')) {
                navigator.clipboard.writeText(targetUrl).then(() => {
                    alert('✅ 链接已复制！请打开系统浏览器粘贴访问。');
                }).catch(() => {
                    // 降级方案
                    const input = document.createElement('input');
                    input.value = targetUrl;
                    document.body.appendChild(input);
                    input.select();
                    document.execCommand('copy');
                    document.body.removeChild(input);
                    alert('✅ 链接已复制！请打开系统浏览器粘贴访问。');
                });
            } else {
                window.location.href = '/';
            }
        }
    </script>
</body>
</html>
