<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" id="metaDesc" content="">
    <meta name="keywords" id="metaKeywords" content="">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root {--bg:#f5f4f1;--surface:#fff;--text:#1a1a24;--text-secondary:#4a4a5a;--text-muted:#8a8a9a;--accent:#4f46e5;--accent-hover:#4338ca;--accent-soft:#eef2ff;--accent-light:#e0e7ff;--border:#e5e3de;--border-light:#f0ede8;--radius-sm:8px;--radius:12px;--radius-lg:18px;--shadow-xs:0 1px 2px rgba(0,0,0,0.04);--shadow-sm:0 2px 8px rgba(0,0,0,0.05);--shadow-md:0 8px 24px rgba(0,0,0,0.07);--transition:0.22s;--font:'Microsoft YaHei','PingFang SC',system-ui,sans-serif;}
        [data-theme="dark"] {--bg:#0f1117;--surface:#1a1c23;--text:#e8e8f0;--text-secondary:#b0b0c0;--text-muted:#6b6b7c;--accent:#6366f1;--accent-soft:#1e1b4b;--accent-light:#312e81;--border:#2a2c35;--border-light:#22232b;}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;display:flex;flex-direction:column}
        .top-header{background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
        .top-inner{max-width:1240px;margin:0 auto;padding:0 24px;display:flex;align-items:center;height:56px;gap:16px;position:relative}
        .site-logo-link{display:flex;align-items:center;gap:10px;cursor:pointer;font-weight:700;font-size:1rem;text-decoration:none;color:var(--text);flex-shrink:0}
        .site-logo-img{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1rem;background:linear-gradient(135deg,var(--accent),#818cf8);overflow:hidden;flex-shrink:0}
        .site-logo-img img{width:100%;height:100%;object-fit:cover}
        .top-nav{display:flex;gap:2px;justify-content:center;flex:1;flex-wrap:wrap}
        .top-nav a{padding:7px 16px;border-radius:8px;text-decoration:none;color:var(--text-secondary);font-size:.88rem;cursor:pointer;font-weight:500;white-space:nowrap}
        .top-nav a:hover,.top-nav a.active{color:var(--accent);background:var(--accent-soft);font-weight:600}
        .header-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
        .search-box{display:flex;align-items:center;background:var(--bg);border-radius:10px;border:1px solid var(--border);height:36px}
        .search-box input{border:none;background:0 0;padding:0 14px;outline:none;color:var(--text);width:120px;font-size:.84rem;font-family:var(--font)}
        .search-box button{background:0 0;border:none;cursor:pointer;padding:0 10px;color:var(--text-muted)}
        .search-box button svg{width:16px;height:16px}
        .icon-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:6px;flex-shrink:0}
        .icon-btn svg{width:18px;height:18px;stroke:var(--text-secondary);fill:none;stroke-width:2;stroke-linecap:round}
        [data-theme="dark"] .sun-icon,[data-theme="light"] .moon-icon{display:none}
        .hamburger-btn{display:none;width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--surface);cursor:pointer;align-items:center;justify-content:center;padding:8px;flex-shrink:0}
        .hamburger-btn span{display:block;width:18px;height:2px;background:var(--text-secondary);border-radius:1px;transition:var(--transition);position:relative}
        .hamburger-btn span::before,.hamburger-btn span::after{content:'';position:absolute;width:18px;height:2px;background:var(--text-secondary);border-radius:1px;transition:var(--transition)}
        .hamburger-btn span::before{top:-6px}.hamburger-btn span::after{top:6px}
        .hamburger-btn.open span{background:transparent}
        .hamburger-btn.open span::before{top:0;transform:rotate(45deg)}.hamburger-btn.open span::after{top:0;transform:rotate(-45deg)}
        .mobile-nav-overlay{display:none;position:fixed;top:56px;left:0;right:0;bottom:0;background:var(--surface);z-index:99;padding:16px;overflow-y:auto;flex-direction:column;gap:4px}
        .mobile-nav-overlay.show{display:flex}.mobile-nav-overlay a{display:block;padding:14px 16px;border-radius:10px;text-decoration:none;color:var(--text-secondary);font-size:1rem;cursor:pointer;font-weight:500;border:1px solid var(--border-light)}
        .mobile-nav-overlay a:hover,.mobile-nav-overlay a.active{color:var(--accent);background:var(--accent-soft);font-weight:600}
        .cat-section{max-width:1240px;margin:0 auto;padding:16px 24px 0}
        .cat-bar{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:4px}
        .cat-tag{padding:8px 18px;border-radius:10px;cursor:pointer;font-size:.85rem;border:1px solid var(--border);background:var(--surface);color:var(--text-secondary);white-space:nowrap;font-weight:500;transition:var(--transition)}
        .cat-tag:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
        .cat-tag.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600;box-shadow:0 2px 8px rgba(79,70,229,0.2)}
        .subcat-bar{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:8px;padding:8px 16px;background:var(--accent-soft);border-radius:12px;max-width:fit-content;margin-left:auto;margin-right:auto}
        .subcat-label{font-size:.72rem;color:var(--accent);font-weight:600;display:flex;align-items:center;padding:4px 8px;white-space:nowrap;opacity:.8}
        .subcat-tag{padding:5px 14px;border-radius:8px;cursor:pointer;font-size:.78rem;border:1px solid var(--accent-light);background:var(--surface);color:var(--text-muted);transition:var(--transition);white-space:nowrap}
        .subcat-tag:hover,.subcat-tag.active{background:var(--accent);color:#fff;border-color:var(--accent)}
        .ad-slot:empty{display:none}
        .container{max-width:1240px;margin:0 auto;padding:18px 24px;flex:1}
        .card-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
        .card{background:var(--surface);border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--border-light);cursor:pointer;transition:var(--transition);box-shadow:var(--shadow-xs)}
        .card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md)}
        .card-img{height:140px;background:linear-gradient(135deg,#e8ecf2,#dde4f0);overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative}
        .card-img img{width:100%;height:100%;object-fit:cover;transition:0.5s;position:absolute;top:0;left:0}
        .card-img .placeholder{color:#9aa;font-size:.85rem;z-index:0}
        .card:hover .card-img img{transform:scale(1.06)}
        .card-body{padding:12px 14px 14px}
        .card-cat{font-size:.68rem;padding:3px 8px;border-radius:6px;background:var(--accent-soft);color:var(--accent);display:inline-block;margin-bottom:6px;font-weight:600}
        .card-title{font-weight:700;font-size:.9rem;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .card-desc{font-size:.75rem;color:var(--text-muted);display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
        .card-date{font-size:.68rem;color:var(--text-muted);margin-top:6px;display:flex;align-items:center;gap:4px}
        .back-btn{display:inline-flex;align-items:center;gap:6px;margin-bottom:14px;color:var(--accent);cursor:pointer;font-weight:600;font-size:.9rem}
        .article-layout{display:flex;gap:24px}
        .article-main{flex:1;min-width:0;background:var(--surface);border-radius:var(--radius-lg);padding:24px 28px;border:1px solid var(--border-light)}
        .article-meta{color:var(--text-muted);font-size:.88rem;margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
        .article-sidebar{width:280px;flex-shrink:0}
        .sidebar-card{background:var(--surface);border-radius:var(--radius-lg);padding:18px;border:1px solid var(--border-light);position:sticky;top:76px}
        .resource-header{font-weight:700;font-size:.92rem;color:var(--text);margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid #2563eb;display:flex;align-items:center;gap:6px}
        .resource-item{margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border-light)}
        .resource-item:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
        .resource-item img{width:100%;border-radius:10px;margin-bottom:8px;max-height:140px;object-fit:cover}
        .res-title{font-weight:700;font-size:.88rem;margin-bottom:2px}.res-desc{font-size:.75rem;color:var(--text-muted);margin-bottom:6px}
        .res-btn{display:block;width:100%;padding:13px 10px;margin:6px 0;border-radius:10px;font-size:.9rem;font-weight:700;cursor:pointer;text-align:center;text-decoration:none;border:none;transition:var(--transition);font-family:var(--font);letter-spacing:.5px}
        .res-btn.free{background:#2563eb;color:#fff;box-shadow:0 4px 14px rgba(37,99,235,0.3)}.res-btn.free:hover{background:#1d4ed8;transform:translateY(-2px)}
        .res-btn.password{background:#eff6ff;color:#2563eb;border:2px solid #bfdbfe}
        .res-btn.pay{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff}.res-btn.both{background:linear-gradient(135deg,#1e40af,#1d4ed8);color:#fff}
        .disclaimer-box{margin-top:28px;padding:18px 20px;background:var(--accent-soft);border-radius:var(--radius);border:1px solid var(--accent-light);font-size:.8rem;color:var(--text-secondary);line-height:1.8}
        .disclaimer-box strong{color:var(--accent);font-size:.85rem}
        .toc-title{font-weight:700;margin:14px 0 8px;font-size:.8rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px}
        .toc-list{list-style:none}.toc-list a{color:var(--text-muted);text-decoration:none;font-size:.78rem;display:block;padding:4px 8px;border-radius:6px}
        .toc-list a:hover{color:var(--accent);background:var(--accent-soft)}
        .article-content{line-height:1.9}.article-content h1,.article-content h2,.article-content h3{margin-top:24px;margin-bottom:10px}
        .article-content img{max-width:100%;border-radius:var(--radius)}.article-content pre{background:#1a1b26;color:#c0caf5;padding:16px;border-radius:var(--radius);overflow-x:auto;font-size:.8rem}
        .article-content blockquote{border-left:4px solid var(--accent);padding:8px 14px;background:var(--accent-soft);margin:12px 0}
        .related-box{margin-top:28px;padding:20px;background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border-light)}
        .related-box h3{font-size:1rem;margin-bottom:12px;color:var(--text)}.related-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
        .related-item{cursor:pointer;text-align:center;transition:var(--transition)}.related-item:hover{transform:translateY(-2px)}
        .related-item img{width:100%;height:80px;object-fit:cover;border-radius:8px;margin-bottom:6px;background:linear-gradient(135deg,#e8ecf2,#dde4f0)}
        .related-item span{font-size:.78rem;color:var(--text-secondary);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .prev-next{display:flex;justify-content:space-between;gap:16px;margin-top:24px;padding-top:20px;border-top:1px solid var(--border-light)}
        .prev-next a{padding:10px 16px;background:var(--accent-soft);border-radius:10px;cursor:pointer;color:var(--accent);font-weight:500;font-size:.85rem;transition:var(--transition);text-decoration:none;flex:1;text-align:center}
        .prev-next a:hover{background:var(--accent);color:#fff}
        .back-to-top{position:fixed;bottom:30px;right:30px;width:44px;height:44px;border-radius:50%;background:var(--accent);color:#fff;border:none;cursor:pointer;display:none;z-index:99;font-size:1.2rem;box-shadow:0 4px 14px rgba(79,70,229,0.3);transition:var(--transition)}
        .back-to-top.show{display:flex;align-items:center;justify-content:center}.back-to-top:hover{background:var(--accent-hover);transform:translateY(-2px)}
        .hidden{display:none!important}
        .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--surface);padding:12px 24px;border-radius:28px;z-index:2000;opacity:0;transition:.3s;box-shadow:var(--shadow-md);pointer-events:none}.toast.show{opacity:1}
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(5px);z-index:1000;display:flex;align-items:center;justify-content:center}.modal-overlay.hidden{display:none}
        .modal-box{background:var(--surface);border-radius:18px;padding:24px;width:420px;max-width:93vw;box-shadow:0 20px 50px rgba(0,0,0,.15)}
        .modal-close{position:absolute;top:10px;right:14px;background:0 0;border:none;font-size:1.1rem;cursor:pointer;color:var(--text-muted)}
        .modal-box h3{margin-bottom:12px;text-align:center;font-size:1.1rem}.modal-box input{width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;margin:6px 0;font-size:.88rem;background:var(--bg);color:var(--text);font-family:var(--font)}
        .modal-box .btn{width:100%;margin-top:6px;padding:10px;border-radius:8px;font-weight:600;cursor:pointer;border:none;font-family:var(--font);font-size:.9rem}
        .search-modal-box{width:560px;max-height:60vh;display:flex;flex-direction:column}
        .search-input-row{display:flex;gap:8px;margin-bottom:10px}.search-input-row input{flex:1;padding:9px 14px;border:1px solid var(--border);border-radius:10px;font-size:.9rem;background:var(--bg);color:var(--text)}
        .search-input-row button{padding:9px 18px;background:var(--accent);color:#fff;border:none;border-radius:10px;cursor:pointer;font-weight:600}
        .search-result-item{padding:12px 14px;border-bottom:1px solid var(--border-light);cursor:pointer}.search-result-item:hover{background:var(--accent-soft)}
        .page-content{max-width:700px;margin:0 auto}.page-content h2{margin-bottom:20px;font-size:1.4rem;font-weight:700}
        .friend-link{display:block;padding:14px 16px;border:1px solid var(--border-light);border-radius:12px;margin-bottom:8px;text-decoration:none;color:var(--text)}.friend-link:hover{border-color:var(--accent);background:var(--accent-soft)}
        .site-footer{margin-top:40px;padding:40px 0 30px;border-top:1px solid var(--border);background:var(--surface)}
        .footer-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:30px;margin-bottom:20px}
        .footer-col h4{font-weight:700;margin-bottom:10px;font-size:.95rem}.footer-col p,.footer-col div{font-size:.84rem;color:var(--text-muted);line-height:1.8}.footer-col a{color:var(--accent);text-decoration:none}
        .footer-bottom{text-align:center;padding-top:20px;border-top:1px solid var(--border-light);font-size:.8rem;color:var(--text-muted)}
        @media(max-width:1024px){.card-grid{grid-template-columns:repeat(3,1fr);gap:14px}.card-img{height:150px}.related-grid{grid-template-columns:repeat(3,1fr)}}
        @media(max-width:768px){.top-nav{display:none}.hamburger-btn{display:flex}.search-box input{width:80px}.card-grid{grid-template-columns:repeat(2,1fr);gap:10px}.card-img{height:110px}.card-body{padding:10px 12px 12px}.card-cat{font-size:.62rem}.card-title{font-size:.82rem}.card-desc{font-size:.7rem}.article-layout{flex-direction:column}.article-sidebar{width:100%}.article-main{padding:16px}.top-inner{padding:0 12px;height:52px;gap:8px}.footer-grid{grid-template-columns:1fr;gap:16px}.cat-tag{padding:6px 14px;font-size:.78rem}.subcat-bar{padding:6px 12px;gap:4px;margin-top:6px}.subcat-tag{padding:4px 10px;font-size:.72rem}.subcat-label{font-size:.68rem}.container{padding:12px 16px}.cat-section{padding:10px 16px 0}.related-grid{grid-template-columns:repeat(2,1fr)}.back-to-top{bottom:20px;right:20px;width:38px;height:38px}}
    </style>
</head>
<body>

<header class="top-header"><div class="top-inner">
    <a class="site-logo-link" onclick="navigate('home')"><div class="site-logo-img" id="logoImg">🌿</div><span id="siteName">你的站点名称</span></a>
    <nav class="top-nav" id="topNav"><a data-page="home" class="active">首页</a><a data-page="friends">友链</a><a data-page="about">关于</a><a data-page="archive">归档</a></nav>
    <div class="header-actions">
        <div class="search-box"><input type="text" id="searchInput" placeholder="搜索..." onkeydown="if(event.key==='Enter')openSearch()"><button onclick="openSearch()"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button></div>
        <button class="icon-btn" onclick="toggleTheme()"><svg class="sun-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg><svg class="moon-icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
        <button class="hamburger-btn" id="hamburgerBtn" onclick="toggleMobileNav()"><span></span></button>
    </div>
</div></header>

<div class="mobile-nav-overlay" id="mobileNavOverlay"></div>
<div class="cat-section" id="catSection"><div class="cat-bar" id="catBar"></div><div class="subcat-bar" id="subcatBar"></div></div>

<div class="container">
    <div class="ad-slot" id="adTopBanner"></div><div class="ad-slot" id="adMobile"></div>

</div>

    <div class="footer-grid"><div class="footer-col"><h4>📖 关于本站</h4><p id="footerAboutText"></p></div><div class="footer-col"><h4 id="footerContactTitle">📬 联系方式</h4><div id="footerContact"></div></div><div class="footer-col"><h4>🔗 快速链接</h4><div id="footerLinksList"></div></div></div>

</div><div id="footerScript"></div></footer>

<div class="modal-overlay hidden" id="searchModal"><div class="modal-box search-modal-box"><button class="modal-close" onclick="$('searchModal').classList.add('hidden')">✕</button><h3>🔍 搜索</h3><div class="search-input-row"><input type="text" id="searchModalInput" placeholder="关键词..." onkeydown="if(event.key==='Enter')doSearch()"><button onclick="doSearch()">搜索</button></div><div id="searchResults"></div></div></div>

<script>
const API='https://YOUR_WORKER_DOMAIN';
let data={articles:[],categories:[],friends:[],pages:[],about:'',site:{},seo:{},footer:{},ads:{}};
let currentPage='home',currentCat='全部',currentSubcat='全部';
let pendingArticleId=null,pendingResIndex=0,currentPayOrderId=null;

function $(id){return document.getElementById(id)}
function toast(m){const t=$('toast');t.textContent=m;t.className='toast show';setTimeout(()=>t.classList.remove('show'),2200)}
function toggleMobileNav(){const b=$('hamburgerBtn');const o=$('mobileNavOverlay');b.classList.toggle('open');o.classList.toggle('show');document.body.style.overflow=o.classList.contains('show')?'hidden':''}
function syncMobileNav(){const active=$(`#topNav a.active`);const page=active?active.dataset.page:'home';document.querySelectorAll('#mobileNavOverlay a').forEach(a=>a.classList.toggle('active',a.dataset.page===page))}

async function redirectViaGo(u){try{const r=await fetch(`${API}/go`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:u})});const d=await r.json();if(d.success&&d.goUrl)window.open(d.goUrl,'_blank');else window.open(u,'_blank')}catch(e){window.open(u,'_blank')}}
async function getResourceUrl(aid,ri){try{const r=await fetch(`${API}/verify`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({articleId:aid,resourceIndex:ri,password:''})});const d=await r.json();if(d.valid&&d.url)redirectViaGo(d.url);else toast('❌ 获取失败')}catch(e){toast('❌ 网络错误')}}

function applySiteConfig(){const s=data.site||{},seo=data.seo||{};$('pageTitle').textContent=s.title||'你的站点名称';$('metaDesc').setAttribute('content',seo.desc||s.desc||'');$('metaKeywords').setAttribute('content',seo.keywords||s.keywords||'');$('faviconLink').setAttribute('href',s.favicon||'');$('siteName').textContent=s.title||'你的站点名称';if(s.logo)$('logoImg').innerHTML=`<img src="${s.logo}" style="width:100%;height:100%;object-fit:cover">`}

function renderNav(){
    const pages=(data.pages||[]).filter(p=>p.showInNav).sort((a,b)=>(a.sortOrder||0)-(b.sortOrder||0));
    let h='<a data-page="home" class="active">首页</a>';pages.forEach(p=>{h+=`<a data-page="page-${p.slug}">${p.navLabel||p.title}</a>`});h+='<a data-page="friends">友链</a><a data-page="about">关于</a><a data-page="archive">归档</a>';
    $('topNav').innerHTML=h;document.querySelectorAll('#topNav a').forEach(l=>l.addEventListener('click',function(e){e.preventDefault();navigate(this.dataset.page)}));
    let m='<a data-page="home" class="active" onclick="navigate(\'home\');toggleMobileNav()">首页</a>';pages.forEach(p=>{m+=`<a data-page="page-${p.slug}" onclick="navigate('page-${p.slug}');toggleMobileNav()">${p.navLabel||p.title}</a>`});m+='<a data-page="friends" onclick="navigate(\'friends\');toggleMobileNav()">友链</a><a data-page="about" onclick="navigate(\'about\');toggleMobileNav()">关于</a><a data-page="archive" onclick="navigate(\'archive\');toggleMobileNav()">归档</a>';
    $('mobileNavOverlay').innerHTML=m;
}

function renderFooter(){const f=data.footer||{},s=data.site||{};$('footerAboutText').textContent=f.about||s.desc||'分享优质资源。';const ct=f.contactTitle||'联系方式';$('footerContactTitle').textContent='📬 '+ct;let c='';for(let i=1;i<=4;i++){const l=f['contact'+i+'Label']||'',v=f['contact'+i+'Value']||'',u=f['contact'+i+'Url']||'';if(l&&v){if(u)c+=`<div>${l} <a href="${u}" target="_blank">${v}</a></div>`;else c+=`<div>${l} ${v}</div>`}}if(!c)c='<div>暂无联系方式</div>';$('footerContact').innerHTML=c;let l='';(f.links||[]).forEach(x=>{l+=`<div><a href="${x.url}">${x.name}</a></div>`});(data.pages||[]).filter(p=>p.showInNav).forEach(p=>{l+=`<div><a href="/page/${p.slug}.html">${p.navLabel||p.title}</a></div>`});if(!l)l='<div>暂无链接</div>';$('footerLinksList').innerHTML=l;$('footerCopyright').textContent=s.copyright||`© ${new Date().getFullYear()} ${s.title||'你的站点名称'}`;$('footerICP').textContent=s.icp||'';$('footerICP').style.display=s.icp?'':'none';if(f.script)$('footerScript').innerHTML=f.script}
function renderAds(){const a=data.ads||{};const m={adTopBanner:'topBanner',adMobile:'mobile',adBottomBanner:'bottomBanner'};Object.entries(m).forEach(([id,k])=>{const el=$(id);if(el){el.innerHTML=a[k]||'';el.style.display=a[k]?'':'none'}})}
function handleRoute(){const p=location.pathname;const pm=p.match(/^\/page\/(.+)\.html$/);if(pm){loadPage(pm[1]);return true}const am=p.match(/^\/article\/(.+)\/(.+)\.html$/);if(am){loadArticle(am[1],am[2]);return true}return false}
async function loadPage(s){try{const r=await fetch(`${API}/page/${s}.html`);const d=await r.json();if(d&&!d.error)navigate('page-'+s)}catch(e){}}
async function loadArticle(cs,as){try{const r=await fetch(`${API}/article/${cs}/${as}.html`);const d=await r.json();if(d&&!d.error){const i=(data.articles||[]).findIndex(x=>x.id===d.id);if(i>=0)data.articles[i]=d;else data.articles.unshift(d);openArticle(d.id,true)}}catch(e){}}

async function init(){try{const r=await fetch(`${API}/data`);if(r.ok)data=await r.json()}catch(e){}['articles','categories','friends','pages'].forEach(k=>{if(!data[k])data[k]=[]});['about','site','seo','footer','ads'].forEach(k=>{if(!data[k])data[k]={}});applySiteConfig();renderNav();renderFooter();renderAds();if(!handleRoute())navigate('home');window.addEventListener('scroll',()=>{$('backToTop').classList.toggle('show',window.scrollY>500)});window.addEventListener('popstate',()=>{if(!handleRoute())navigate('home')})}

function navigate(page){currentPage=page;document.querySelectorAll('#topNav a').forEach(a=>a.classList.remove('active'));const al=document.querySelector(`#topNav a[data-page="${page}"]`);if(al)al.classList.add('active');syncMobileNav();['homeView','articleView','friendsView','aboutView','archiveView','pageView'].forEach(v=>{const el=$(v);if(el)el.classList.add('hidden')});const cs=$('catSection');if(cs)cs.classList.add('hidden');if(page==='home'){$('homeView').classList.remove('hidden');if(cs)cs.classList.remove('hidden');renderCats();renderCards();window.history.pushState({page:'home'},'','/')}else if(page==='friends'){$('friendsView').classList.remove('hidden');renderFriends()}else if(page==='about'){$('aboutView').classList.remove('hidden');$('aboutContent').innerHTML=data.about||'<p style="text-align:center;padding:60px;color:var(--text-muted)">暂无内容</p>'}else if(page==='archive'){$('archiveView').classList.remove('hidden');renderArchive()}else if(page.startsWith('page-')){const slug=page.replace('page-','');const pd=(data.pages||[]).find(p=>p.slug===slug);if(pd){if(!$('pageView')){const el=document.createElement('div');el.id='pageView';el.className='hidden';document.querySelector('.container').appendChild(el)}$('pageView').classList.remove('hidden');$('pageView').innerHTML=`<div class="page-content"><h2>${pd.title}</h2><div class="article-content">${pd.content||''}</div></div>`;window.history.pushState({page:page},'',`/page/${slug}.html`)}}}

function renderCats(){
    const cats=data.categories||[];
    const merged={};
    cats.forEach(c=>{const n=typeof c==='string'?c:c.name;if(!merged[n])merged[n]={name:n,children:[]};if(typeof c!=='string'&&c.children)merged[n].children=[...new Set([...merged[n].children,...c.children])]});
    const uniqueCats=Object.values(merged);
    let h='<span class="cat-tag active" onclick="filterCat(\'全部\')">📂 全部</span>';
    uniqueCats.forEach(c=>{h+=`<span class="cat-tag" onclick="filterCat('${c.name}')">${c.name}</span>`});
    $('catBar').innerHTML=h;renderSubcats();
}

function renderSubcats(){
    if(currentCat==='全部'){$('subcatBar').innerHTML='';return}
    const cats=data.categories||[];let allChildren=[];
    cats.forEach(c=>{const n=typeof c==='string'?c:c.name;if(n===currentCat&&typeof c!=='string'&&c.children)allChildren=[...allChildren,...c.children]});
    allChildren=[...new Set(allChildren)];
    if(allChildren.length===0){$('subcatBar').innerHTML='';return}
    let h=`<span class="subcat-label">📁 ${currentCat}：</span>`;
    h+='<span class="subcat-tag active" onclick="filterSubcat(\'全部\')">全部</span>';
    allChildren.forEach(s=>{h+=`<span class="subcat-tag" onclick="filterSubcat('${s}')">${s}</span>`});
    $('subcatBar').innerHTML=h;
}

function filterCat(c){currentCat=c;currentSubcat='全部';renderCats();renderCards()}function filterSubcat(s){currentSubcat=s;renderSubcats();document.querySelectorAll('.subcat-tag').forEach(t=>t.classList.toggle('active',t.textContent.trim()===s));renderCards()}

function formatDate(ts){const d=new Date(ts);const now=new Date();const diff=now-d;if(diff<86400000&&d.getDate()===now.getDate())return '今天';if(diff<172800000&&d.getDate()===now.getDate()-1)return '昨天';return d.toLocaleDateString('zh-CN',{month:'short',day:'numeric'})}

function renderCards(){let f=data.articles||[];if(currentCat!=='全部')f=f.filter(a=>a.category===currentCat);if(currentSubcat!=='全部')f=f.filter(a=>a.subcategory===currentSubcat);if(!f.length){$('cardGrid').innerHTML='<p style="text-align:center;padding:80px;color:var(--text-muted);grid-column:1/-1">📭 暂无内容</p>';return}let h='';f.forEach((a,i)=>{const coverUrl=a.cover||'';let imgHtml='';if(coverUrl){imgHtml=`<img src="${coverUrl}" alt="${a.title}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">`;imgHtml+=`<span class="placeholder" style="display:none;">📷 暂无封面</span>`}else{imgHtml='<span class="placeholder">📷 暂无封面</span>'}h+=`<div class="card" onclick="openArticle('${a.id}')"><div class="card-img">${imgHtml}</div><div class="card-body"><span class="card-cat">${a.category||'未分类'}${a.subcategory?' · '+a.subcategory:''}</span><div class="card-title">${a.title}</div><div class="card-desc">${a.summary||''}</div><div class="card-date">🕐 ${formatDate(a.created_at)}</div></div></div>`;if(data.ads?.listBetween&&(i+1)%6===0)h+=`<div style="grid-column:1/-1">${data.ads.listBetween}</div>`});$('cardGrid').innerHTML=h}

function openArticle(id,fromRoute=false){const a=(data.articles||[]).find(x=>x.id===id);if(!a)return;currentPage='article';['homeView','friendsView','aboutView','archiveView','pageView'].forEach(v=>{const el=$(v);if(el)el.classList.add('hidden')});$('catSection').classList.add('hidden');$('articleView').classList.remove('hidden');const catSlug=a.category_slug||'other';const artSlug=a.slug||a.article_order||'1';if(!fromRoute)window.history.pushState({articleId:id},'',`/article/${catSlug}/${artSlug}.html`);let links=[];if(Array.isArray(a.resource_links))links=a.resource_links;else if(typeof a.resource_links==='string')try{links=JSON.parse(a.resource_links)}catch(e){}const fullDate=new Date(a.created_at).toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric'});let h='<div class="back-btn" onclick="navigate(\'home\')">← 返回首页</div><div class="article-layout"><div class="article-main">';h+=`<h1>${a.title}</h1><div class="article-meta"><span>📅 ${fullDate}</span><span>📂 ${a.category||'未分类'}${a.subcategory?' / '+a.subcategory:''}</span></div>`;if(data.ads?.inArticle)h+=`<div style="margin:16px 0">${data.ads.inArticle}</div>`;h+=`<div class="article-content">${a.content||''}</div>`;const idx=(data.articles||[]).findIndex(x=>x.id===id);const prev=idx>0?data.articles[idx-1]:null;const next=idx<data.articles.length-1?data.articles[idx+1]:null;if(prev||next){h+='<div class="prev-next">';if(prev)h+=`<a onclick="openArticle('${prev.id}')">← ${prev.title}</a>`;else h+='<span></span>';if(next)h+=`<a onclick="openArticle('${next.id}')">${next.title} →</a>`;else h+='<span></span>';h+='</div>'}const related=(data.articles||[]).filter(x=>x.category===a.category&&x.id!==a.id).slice(0,4);if(related.length>0){h+='<div class="related-box"><h3>📖 相关文章</h3><div class="related-grid">';related.forEach(r=>{h+=`<div class="related-item" onclick="openArticle('${r.id}')"><img src="${r.cover||''}" onerror="this.style.display='none'"><span>${r.title}</span></div>`});h+='</div></div>'}h+=`<div class="disclaimer-box"><strong>📢 免责声明</strong><br>1. 本站资源来源于网络收集，仅供学习交流使用，请勿用于商业用途。本站不提供任何技术支持。<br>2. 如本站内容侵犯了您的合法权益，请通过联系方式告知，我们将第一时间核实处理。</div></div><div class="article-sidebar"><div class="sidebar-card">`;if(data.ads?.sidebar)h+=`<div style="margin-bottom:12px">${data.ads.sidebar}</div>`;if(links.length>0){h+='<div class="resource-header">📥 资源下载</div>';links.forEach((res,i)=>{h+='<div class="resource-item">';if(res.image)h+=`<img src="${res.image}" onerror="this.style.display='none'">`;if(res.title)h+=`<div class="res-title">${res.title}</div>`;if(res.desc)h+=`<div class="res-desc">${res.desc}</div>`;const t=res.accessType||'free';const b=res.btnText||'下载';if(t==='free')h+=`<button class="res-btn free" onclick="event.stopPropagation();getResourceUrl('${a.id}',${i})">🚀 ${b}</button>`;else if(t==='password')h+=`<button class="res-btn password" onclick="event.stopPropagation();openPwdModal('${a.id}',${i})">🔒 ${b}</button>`;else if(t==='pay')h+=`<button class="res-btn pay" onclick="event.stopPropagation();openPayModal('${a.id}',${i})">💰 ${b} · ¥${res.price||0}</button>`;else if(t==='both')h+=`<button class="res-btn both" onclick="event.stopPropagation();openPwdModal('${a.id}',${i})">🔒💰 ${b} · ¥${res.price||0}</button>`;h+='</div>'})}h+='<div class="toc-title">📑 文章目录</div><ul class="toc-list" id="tocList"></ul></div></div></div>';$('articleView').innerHTML=h;setTimeout(()=>{document.querySelectorAll('#articleView pre code').forEach(b=>hljs.highlightElement(b));generateTOC()},150);window.scrollTo(0,0)}
function generateTOC(){const hs=document.querySelectorAll('#articleView .article-content h1,#articleView .article-content h2,#articleView .article-content h3');const toc=$('tocList');if(!toc)return;if(!hs.length){toc.innerHTML='<li style="color:var(--text-muted);padding:8px">暂无目录</li>';return}hs.forEach((h,i)=>{if(!h.id)h.id='h-'+i});toc.innerHTML=Array.from(hs).map(h=>`<li><a href="#${h.id}" onclick="event.preventDefault();document.getElementById('${h.id}').scrollIntoView({behavior:'smooth'})">${h.textContent}</a></li>`).join('')}

function openPwdModal(aid,ri){const a=(data.articles||[]).find(x=>x.id===aid);if(!a)return;let links=[];if(Array.isArray(a.resource_links))links=a.resource_links;else if(typeof a.resource_links==='string')try{links=JSON.parse(a.resource_links)}catch(e){}const res=links[ri];if(!res)return;pendingArticleId=aid;pendingResIndex=ri;$('pwdResTitle').textContent=res.title||a.title;$('pwdInput').value='';$('pwdError').textContent='';$('pwdModal').classList.remove('hidden');setTimeout(()=>$('pwdInput').focus(),100)}
async function verifyPwd(){const p=$('pwdInput').value.trim();if(!p){$('pwdError').textContent='请输入密码';return}try{const r=await fetch(`${API}/verify`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({articleId:pendingArticleId,resourceIndex:pendingResIndex,password:p})});const d=await r.json();if(d.valid){$('pwdModal').classList.add('hidden');if(d.needPay)openPayModal(pendingArticleId,pendingResIndex);else redirectViaGo(d.url)}else $('pwdError').textContent=d.error||'密码错误'}catch(e){$('pwdError').textContent='验证失败'}}
function openPayModal(aid,ri){const a=(data.articles||[]).find(x=>x.id===aid);if(!a)return;let links=[];if(Array.isArray(a.resource_links))links=a.resource_links;else if(typeof a.resource_links==='string')try{links=JSON.parse(a.resource_links)}catch(e){}const res=links[ri];if(!res)return;pendingArticleId=aid;pendingResIndex=ri;$('payResTitle').textContent=res.title||a.title;$('payAmount').textContent=res.price||0;$('payEmail').value='';$('payForm').style.display='block';$('payWait').style.display='none';$('payResult').innerHTML='';$('payModal').classList.remove('hidden')}
async function createOrder(){const e=$('payEmail').value.trim();if(!e){toast('请填写邮箱');return}try{const r=await fetch(`${API}/order`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({articleId:pendingArticleId,resourceIndex:pendingResIndex,email:e})});const d=await r.json();if(d.success){currentPayOrderId=d.orderId;$('payQRCode').src=d.qrcode||'';$('payForm').style.display='none';$('payWait').style.display='block'}else toast('❌ '+d.error)}catch(e){toast('❌ 网络错误')}}
async function checkPayStatus(){if(!currentPayOrderId)return;try{const r=await fetch(`${API}/order-status?id=${currentPayOrderId}`);const d=await r.json();if(d.status==='completed')$('payResult').innerHTML=`<span style="color:#10b981">✅ 支付成功！</span><br><a href="#" onclick="event.preventDefault();redirectViaGo('${d.url}')" style="color:#2563eb">点击下载</a>`;else $('payResult').innerHTML='<span style="color:#f59e0b">⏳ 等待确认</span>'}catch(e){}}

function renderFriends(){const fs=data.friends||[];$('friendsList').innerHTML=fs.length?fs.map(f=>`<a href="${f.url}" target="_blank" rel="noopener" class="friend-link"><strong>${f.name}</strong>${f.desc?`<span>${f.desc}</span>`:''}</a>`).join(''):'<p style="text-align:center;padding:60px;color:var(--text-muted)">暂无友链</p>'}
function renderArchive(){const arts=data.articles||[];const g={};arts.forEach(a=>{const y=new Date(a.created_at).getFullYear();if(!g[y])g[y]=[];g[y].push(a)});const ys=Object.keys(g).sort((a,b)=>b-a);if(!ys.length){$('archiveList').innerHTML='<p style="text-align:center;padding:60px;color:var(--text-muted)">暂无文章</p>';return}let h='';ys.forEach(y=>{h+=`<h3 style="color:var(--accent)">📅 ${y} 年</h3>`;g[y].sort((a,b)=>b.created_at-a.created_at).forEach(a=>{h+=`<div class="friend-link" style="cursor:pointer" onclick="openArticle('${a.id}')"><strong>${a.title}</strong><span>${new Date(a.created_at).toLocaleDateString('zh-CN')} · ${a.category||''}</span></div>`})});$('archiveList').innerHTML=h}
function openSearch(){$('searchModalInput').value=$('searchInput').value;$('searchResults').innerHTML='<p style="text-align:center;padding:20px;color:var(--text-muted)">输入关键词搜索</p>';$('searchModal').classList.remove('hidden');setTimeout(()=>$('searchModalInput').focus(),100)}
async function doSearch(){const q=$('searchModalInput').value.trim();if(!q)return;try{const r=await fetch(`${API}/search?q=${encodeURIComponent(q)}`);const d=await r.json();$('searchResults').innerHTML=(d.results||[]).length?d.results.map(a=>`<div class="search-result-item" onclick="$('searchModal').classList.add('hidden');openArticle('${a.id}')"><strong>${a.title}</strong><small>${a.summary||''}</small></div>`).join(''):'<p style="text-align:center;padding:20px;color:var(--text-muted)">未找到结果</p>'}catch(e){}}
function toggleTheme(){document.documentElement.dataset.theme=document.documentElement.dataset.theme==='dark'?'light':'dark'}
document.addEventListener('click',e=>{if(e.target.classList.contains('modal-overlay'))e.target.classList.add('hidden')});
init();
</script>
</body>
</html>
